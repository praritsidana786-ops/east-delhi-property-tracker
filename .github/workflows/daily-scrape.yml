name: Daily East Delhi Property Scan

on:
  # 01:30 UTC = 07:00 IST. GitHub Actions cron runs in UTC only.
  schedule:
    - cron: "30 1 * * *"
  # Manual trigger from the Actions tab for on-demand runs / testing.
  workflow_dispatch:

# Only one scan at a time; cancel overlapping runs.
concurrency:
  group: property-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Chromium)
        run: |
          python -m playwright install --with-deps chromium

      - name: Restore seen_listings.json cache
        id: seen-cache
        uses: actions/cache@v4
        with:
          path: seen_listings.json
          key: seen-listings-${{ github.run_id }}
          restore-keys: |
            seen-listings-

      - name: Run property tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: python property_tracker.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: |
            seen_listings.json
          retention-days: 7
          if-no-files-found: ignore
